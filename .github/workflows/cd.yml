name: CD - Deploy to Firebase (Blue-Green)

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [staging]
  workflow_dispatch:
    inputs:
      rollback_version:
        description: "Optional Firebase Hosting VERSION_ID to roll back to live"
        required: false
        type: string
      rollback_reason:
        description: "Reason for manual rollback"
        required: false
        default: "Manual rollback"
        type: string

permissions:
  actions: read
  contents: read

env:
  FIREBASE_PROJECT_ID: assignment-deadline-trac-7bd75
  FIREBASE_SITE_ID: assignment-deadline-trac-7bd75
  STAGING_CHANNEL_ID: staging
  CANDIDATE_CHANNEL_ID: production-candidate
  ROLLBACK_BACKUP_CHANNEL_ID: rollback-backup
  PRODUCTION_URL: https://assignment-deadline-trac-7bd75.web.app
  HEALTHCHECK_ATTEMPTS: "6"
  HEALTHCHECK_DELAY_SECONDS: "10"
  AUTO_ROLLBACK_RTO_MINUTES: "15"

jobs:
  ci-gate-check:
    name: CI Gate Check
    runs-on: ubuntu-latest
    outputs:
      release_mode: ${{ steps.mode.outputs.release_mode }}

    steps:
      - name: Determine release mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.rollback_version }}" ]; then
            echo "release_mode=rollback" >> "$GITHUB_OUTPUT"
          else
            echo "release_mode=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate trigger
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "${{ inputs.rollback_version }}" ]; then
            echo "workflow_dispatch is reserved for manual rollback in this pipeline."
            echo "Provide a Firebase Hosting VERSION_ID in rollback_version."
            exit 1
          fi
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "CI gate check failed because the upstream CI workflow was not successful."
            exit 1
          fi

      - name: Release gate summary
        shell: bash
        run: |
          {
            echo "## CI Gate Check"
            echo ""
            echo "- Release mode: ${{ steps.mode.outputs.release_mode }}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Flow: CI Gate Check -> Build Blue -> Validate Blue -> Cut-over -> Post-Deploy Monitor"
          } >> "$GITHUB_STEP_SUMMARY"

  build-blue-new-version:
    name: Build Blue (new version)
    runs-on: ubuntu-latest
    needs: ci-gate-check
    if: ${{ needs.ci-gate-check.outputs.release_mode == 'deploy' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ github.event.workflow_run.head_sha }}
          path: dist/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Save current live release
        shell: bash
        run: |
          firebase hosting:clone \
            "${FIREBASE_SITE_ID}:live" \
            "${FIREBASE_SITE_ID}:${ROLLBACK_BACKUP_CHANNEL_ID}" \
            --project "${FIREBASE_PROJECT_ID}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy staging and candidate blue versions
        shell: bash
        run: |
          firebase hosting:channel:deploy "${STAGING_CHANNEL_ID}" \
            --project "${FIREBASE_PROJECT_ID}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"
          firebase hosting:channel:deploy "${CANDIDATE_CHANNEL_ID}" \
            --project "${FIREBASE_PROJECT_ID}" \
            --expires 7d \
            --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Build blue summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Build Blue Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Saved backup channel: \`${ROLLBACK_BACKUP_CHANNEL_ID}\`"
            echo "- Staging channel: \`${STAGING_CHANNEL_ID}\`"
            echo "- Candidate channel: \`${CANDIDATE_CHANNEL_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  validate-blue-smoke-test:
    name: Validate Blue (smoke test)
    runs-on: ubuntu-latest
    needs: [ci-gate-check, build-blue-new-version]
    if: ${{ needs.ci-gate-check.outputs.release_mode == 'deploy' }}
    outputs:
      staging_url: ${{ steps.urls.outputs.staging_url }}
      candidate_url: ${{ steps.urls.outputs.candidate_url }}

    steps:
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Resolve staging and candidate URLs
        id: urls
        shell: bash
        run: |
          staging_url=$(firebase hosting:channel:open "${STAGING_CHANNEL_ID}" \
            --project "${FIREBASE_PROJECT_ID}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" | tail -n 1)
          candidate_url=$(firebase hosting:channel:open "${CANDIDATE_CHANNEL_ID}" \
            --project "${FIREBASE_PROJECT_ID}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" | tail -n 1)
          echo "staging_url=$staging_url" >> "$GITHUB_OUTPUT"
          echo "candidate_url=$candidate_url" >> "$GITHUB_OUTPUT"

      - name: Smoke test staging and monitor candidate
        shell: bash
        run: |
          curl -f "${{ steps.urls.outputs.staging_url }}"
          for attempt in $(seq 1 "${HEALTHCHECK_ATTEMPTS}"); do
            echo "Candidate health check ${attempt}/${HEALTHCHECK_ATTEMPTS}: ${{ steps.urls.outputs.candidate_url }}"
            curl -f --retry 2 --retry-delay 2 "${{ steps.urls.outputs.candidate_url }}" >/dev/null
            if [ "$attempt" -lt "${HEALTHCHECK_ATTEMPTS}" ]; then
              sleep "${HEALTHCHECK_DELAY_SECONDS}"
            fi
          done

      - name: Validate blue summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Validate Blue Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Staging URL: ${{ steps.urls.outputs.staging_url }}"
            echo "- Candidate URL: ${{ steps.urls.outputs.candidate_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  cut-over-green-blue:
    name: Cut-over (Green -> Blue)
    runs-on: ubuntu-latest
    needs: [ci-gate-check, validate-blue-smoke-test]
    if: ${{ needs.ci-gate-check.outputs.release_mode == 'deploy' }}

    steps:
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Promote validated candidate to live
        shell: bash
        run: |
          firebase hosting:clone \
            "${FIREBASE_SITE_ID}:${CANDIDATE_CHANNEL_ID}" \
            "${FIREBASE_SITE_ID}:live" \
            --project "${FIREBASE_PROJECT_ID}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Cut-over summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Cut-over Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Candidate promoted to live after successful blue validation"
          } >> "$GITHUB_STEP_SUMMARY"

  post-deploy-monitor:
    name: Post-Deploy Monitor
    runs-on: ubuntu-latest
    needs: [ci-gate-check, cut-over-green-blue]
    if: ${{ needs.ci-gate-check.outputs.release_mode == 'deploy' }}

    steps:
      - name: Monitor production health
        shell: bash
        run: |
          for attempt in $(seq 1 "${HEALTHCHECK_ATTEMPTS}"); do
            echo "Production health check ${attempt}/${HEALTHCHECK_ATTEMPTS}: ${PRODUCTION_URL}"
            curl -f --retry 2 --retry-delay 2 "${PRODUCTION_URL}" >/dev/null
            if [ "$attempt" -lt "${HEALTHCHECK_ATTEMPTS}" ]; then
              sleep "${HEALTHCHECK_DELAY_SECONDS}"
            fi
          done

      - name: Post-deploy summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Post-Deploy Monitor Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Production URL: ${PRODUCTION_URL}"
            echo "- Health checks: ${HEALTHCHECK_ATTEMPTS} attempts every ${HEALTHCHECK_DELAY_SECONDS} seconds"
          } >> "$GITHUB_STEP_SUMMARY"

  rollback-blue-green:
    name: Rollback (Blue -> Green)
    runs-on: ubuntu-latest
    needs: [ci-gate-check, build-blue-new-version, validate-blue-smoke-test, cut-over-green-blue, post-deploy-monitor]
    if: ${{ always() && needs.ci-gate-check.outputs.release_mode == 'deploy' && needs.post-deploy-monitor.result == 'failure' }}

    steps:
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Restore previous live release
        shell: bash
        run: |
          firebase hosting:clone \
            "${FIREBASE_SITE_ID}:${ROLLBACK_BACKUP_CHANNEL_ID}" \
            "${FIREBASE_SITE_ID}:live" \
            --project "${FIREBASE_PROJECT_ID}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Rollback summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Rollback Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Restored channel: \`${ROLLBACK_BACKUP_CHANNEL_ID}\`"
            echo "- RTO target: ${AUTO_ROLLBACK_RTO_MINUTES} minutes"
          } >> "$GITHUB_STEP_SUMMARY"

  manual-rollback-specific-version:
    name: Rollback to Specific Version
    runs-on: ubuntu-latest
    needs: ci-gate-check
    if: ${{ needs.ci-gate-check.outputs.release_mode == 'rollback' }}

    steps:
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Save current live release and roll back
        shell: bash
        run: |
          firebase hosting:clone \
            "${FIREBASE_SITE_ID}:live" \
            "${FIREBASE_SITE_ID}:${ROLLBACK_BACKUP_CHANNEL_ID}" \
            --project "${FIREBASE_PROJECT_ID}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"
          firebase hosting:clone \
            "${FIREBASE_SITE_ID}:@${{ inputs.rollback_version }}" \
            "${FIREBASE_SITE_ID}:live" \
            --project "${FIREBASE_PROJECT_ID}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Manual rollback summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Manual Rollback Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Rollback version: \`${{ inputs.rollback_version }}\`"
            echo "- Reason: ${{ inputs.rollback_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"
