name: CD - Deploy to Firebase (Blue-Green)

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'pull_request') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ github.event.workflow_run.head_sha }}
          path: dist/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Staging (Green)
        run: |
          firebase hosting:channel:deploy staging \
          --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Smoke Test (Staging URL)
        run: |
          curl -f https://assignment-deadline-trac-7bd75.web.app || exit 1

      - name: Deploy to Production (Blue Switch)
        run: |
          firebase deploy --only hosting \
          --token "${{ secrets.FIREBASE_TOKEN }}"
