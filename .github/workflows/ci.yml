name: CI Pipeline

on:
  push:
    branches: [dev,staging, feature/*]
  pull_request:
    branches: [staging,main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Lint check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project (Vite)
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high