name: CI Pipeline

on:
  push:
    branches: [dev, staging, feature/*]
  pull_request:
    branches: [staging, main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project (Vite)
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          npm run build 2>&1 | tee ci-logs/build.log

      - name: Build summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Build Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Log: \`ci-logs/build.log\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build output
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: dist-build-${{ github.sha }}
          path: dist

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run lint
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          npm run lint 2>&1 | tee ci-logs/lint.log

      - name: Lint summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Lint Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Log: \`ci-logs/lint.log\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure log tail
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "::group::Lint failure details"
          tail -n 80 ci-logs/lint.log
          echo "::endgroup::"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          npm test 2>&1 | tee ci-logs/test.log

      - name: Test summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Test Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Log: \`ci-logs/test.log\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure log tail
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "::group::Test failure details"
          tail -n 80 ci-logs/test.log
          echo "::endgroup::"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Security audit
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          npm audit --audit-level=high 2>&1 | tee ci-logs/security.log

      - name: Security summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Security Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Log: \`ci-logs/security.log\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure log tail
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "::group::Security scan failure details"
          tail -n 80 ci-logs/security.log
          echo "::endgroup::"

  staging-e2e:
    name: Staging E2E
    runs-on: ubuntu-latest
    needs: [build, lint, test, security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dist-build-${{ github.sha }}
          path: dist

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run staging E2E smoke test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          npx vite preview --host 127.0.0.1 --port 4173 > ci-logs/vite-preview.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            sleep 2
          done
          npx playwright test --config=playwright.config.ts 2>&1 | tee ci-logs/staging-e2e.log

      - name: Staging E2E summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Staging E2E Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Log: \`ci-logs/staging-e2e.log\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure log tail
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "::group::Staging E2E failure details"
          tail -n 80 ci-logs/vite-preview.log || true
          tail -n 80 ci-logs/staging-e2e.log || true
          echo "::endgroup::"

  lighthouse-audit:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [build, lint, test, security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dist-build-${{ github.sha }}
          path: dist

      - name: Run Lighthouse CI
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          npm run test:lighthouse 2>&1 | tee ci-logs/lighthouse.log

      - name: Lighthouse summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Lighthouse Summary"
            echo ""
            echo "- Result: ${{ job.status }}"
            echo "- Log: \`ci-logs/lighthouse.log\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Failure log tail
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "::group::Lighthouse failure details"
          tail -n 80 ci-logs/lighthouse.log
          echo "::endgroup::"

  package-artifact:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: [build, lint, test, security-scan, staging-e2e, lighthouse-audit]

    steps:
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: dist-build-${{ github.sha }}
          path: dist

      - name: Package summary
        shell: bash
        run: |
          {
            echo "## Package Summary"
            echo ""
            echo "- Result: pending upload"
            echo "- Source artifact: \`dist-build-${{ github.sha }}\`"
            echo "- Final artifact: \`release-${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: dist
