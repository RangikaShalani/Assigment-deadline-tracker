name: CD — Deploy to Firebase (Blue-Green)

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ github.event.workflow_run.head_sha }}
          path: dist/

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Staging (Green)
        run: |
          firebase hosting:channel:deploy staging \
          --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Smoke Test (Staging URL)
        run: |
          curl -f https://staging--YOUR_PROJECT.web.app || exit 1

      - name: Deploy to Production (Blue Switch)
        run: |
          firebase deploy --only hosting \
          --token "${{ secrets.FIREBASE_TOKEN }}"